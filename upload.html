<!DOCTYPE html>
<html>
<head>
  <title>Home Call Guard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 220px;
      background: #020617;
      padding: 20px;
      border-right: 1px solid #1e293b;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: #22c55e;
      margin-bottom: 30px;
    }

    .nav-item {
      margin: 10px 0;
      color: #94a3b8;
    }

    .nav-item.active {
      color: white;
    }

    .main {
      flex: 1;
      padding: 40px;
    }

    .card {
      background: #020617;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #1e293b;
      margin-bottom: 20px;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 10px 20px;
      color: black;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
    }

    input {
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #1e293b;
      text-align: left;
    }

    .tag {
      background: #dc2626;
      padding: 4px 8px;
      border-radius: 5px;
      font-size: 12px;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
<div class="logo" style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
  <img src="/logo.png" style="height:40px;">
  <div style="font-size:18px; font-weight:bold;">
    Home Call <span style="color:#00ff99;">Guard</span>
  </div>
</div>

    <div class="nav-item active">Dashboard</div>
    <div class="nav-item">Call Logs</div>
    <div class="nav-item">Contacts</div>
  </div>

  <div class="main">

    <h1>Dashboard</h1>

    <div class="card">
      <h3>Upload Contacts</h3>
      <form action="/upload-contacts" method="post" enctype="multipart/form-data">
        <input type="file" name="file"><br>
        <button type="submit">Upload CSV</button>
      </form>
    </div>

    <div class="card">
      <h3>Recent Calls</h3>

      <table>
        <tr>
          <th>Number</th>
          <th>Status</th>
          <th>AI Result</th>
        </tr>

        <tr>
          <td>+447700900123</td>
          <td><span class="tag">Unknown</span></td>
          <td>Likely scam (energy)</td>
        </tr>

      </table>
    </div>

  </div>

</div>

</body>
</html>
