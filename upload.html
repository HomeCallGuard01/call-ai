<!DOCTYPE html>
<html>
<head>
  <title>Home Call Guard</title>
</head>

<body style="font-family: Arial; text-align: center; padding: 40px;">

  <h1>📞 Home Call Guard</h1>

  <h3>Upload Contacts (CSV)</h3>

  <form action="/upload-contacts" method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required />
    <br><br>
    <button type="submit">Upload Contacts</button>
  </form>

  <p style="margin-top: 30px;">
    Format: Name,Number<br>
    Example: Andrew,07733413030
  </p>

</body>
</html>
