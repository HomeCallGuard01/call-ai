<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Call Guard — Reset Password</title>

<style>
  body {
    font-family: Arial;
    background: #0b1220;
    color: white;
    padding: 20px;
    text-align: center;
  }

  h1 {
    color: #00ff99;
    font-size: 26px;
  }

  .box {
    background: #111a2e;
    padding: 30px;
    margin: 20px auto;
    border-radius: 10px;
    max-width: 400px;
    text-align: left;
  }

  p.hint {
    color: #94a3b8;
    font-size: 14px;
    margin-top: 0;
  }

  label {
    display: block;
    margin-top: 14px;
    margin-bottom: 6px;
    font-size: 14px;
    color: #94a3b8;
  }

  input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #334155;
    background: #0b1220;
    color: white;
    font-size: 15px;
    box-sizing: border-box;
  }

  button {
    width: 100%;
    margin-top: 24px;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    background-color: #00ff99;
    color: black;
    border: none;
    font-weight: bold;
  }

  button:disabled {
    opacity: 0.7;
    cursor: default;
  }

  .footer-link {
    text-align: center;
    margin-top: 18px;
    font-size: 14px;
  }

  .footer-link a {
    color: #00ff99;
  }

  .notice-panel {
    text-align: center;
  }

  .notice-panel h2 {
    color: #00ff99;
    font-size: 22px;
    margin-bottom: 10px;
  }

  .notice-panel p {
    color: #cbd5e1;
    font-size: 15px;
    line-height: 1.5;
  }
</style>
</head>

<body>

<img src="/logo.png" style="height:130px; margin-bottom:10px;">

<h1>Reset your password</h1>

<div class="box">

  <div id="noticePanel" class="notice-panel" hidden>
    <h2>Check your email</h2>
    <p>If that email is registered, a password reset link has been sent.</p>
  </div>

  <div id="formBox">
    <p class="hint">Enter the email on your account and we'll send you a link to reset your password.</p>

    <form id="forgotForm" action="/forgot-password" method="POST">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <button type="submit" id="submitButton">Send Reset Link</button>
    </form>
  </div>

  <div class="footer-link">
    <a href="/login.html">Back to log in</a>
  </div>
</div>

<script>
  var params = new URLSearchParams(window.location.search);

  if (params.get("state") === "sent") {
    document.getElementById("formBox").hidden = true;
    document.getElementById("noticePanel").hidden = false;
  }

  document.getElementById("forgotForm").addEventListener("submit", function () {
    var btn = document.getElementById("submitButton");
    btn.disabled = true;
    btn.textContent = "Sending…";
  });
</script>

</body>
</html>
