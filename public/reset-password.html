<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Call Guard — Set New Password</title>

<style>
  body {
    font-family: Arial;
    background: #0b1220;
    color: white;
    padding: 20px;
    text-align: center;
  }

  h1 {
    color: #00ff99;
    font-size: 26px;
  }

  .box {
    background: #111a2e;
    padding: 30px;
    margin: 20px auto;
    border-radius: 10px;
    max-width: 400px;
    text-align: left;
  }

  label {
    display: block;
    margin-top: 14px;
    margin-bottom: 6px;
    font-size: 14px;
    color: #94a3b8;
  }

  input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #334155;
    background: #0b1220;
    color: white;
    font-size: 15px;
  }

  button {
    width: 100%;
    margin-top: 24px;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    background-color: #00ff99;
    color: black;
    border: none;
    font-weight: bold;
  }

  .error-banner {
    background: #1e293b;
    border: 1px solid #f59e0b;
    color: #fde68a;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 14px;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
    text-align: left;
  }
</style>
</head>

<body>

<img src="/logo.png" style="height:80px; margin-bottom:10px;">

<h1>Set a new password</h1>

<div id="errorBanner" class="error-banner" role="alert" hidden>
  This reset link is missing or invalid. Please request a new one from the
  <a href="/forgot-password.html" style="color:#fde68a;">forgot password</a> page.
</div>

<div class="box" id="formBox">
  <form id="resetForm" action="/reset-password-complete" method="POST">
    <input type="hidden" id="access_token" name="access_token">
    <input type="hidden" id="refresh_token" name="refresh_token">

    <label for="new_password">New password</label>
    <input type="password" id="new_password" name="new_password" minlength="8" required>

    <label for="confirm_password">Confirm new password</label>
    <input type="password" id="confirm_password" name="confirm_password" minlength="8" required>

    <button type="submit">Set New Password</button>
  </form>
</div>

<script>
  // Supabase puts the recovery token in the URL fragment (never sent to a
  // server, by design), so it can only be read here in the browser.
  var hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
  var accessToken = hashParams.get("access_token");
  var refreshToken = hashParams.get("refresh_token");

  if (!accessToken || !refreshToken) {
    document.getElementById("formBox").hidden = true;
    document.getElementById("errorBanner").hidden = false;
  } else {
    document.getElementById("access_token").value = accessToken;
    document.getElementById("refresh_token").value = refreshToken;
  }

  document.getElementById("resetForm").addEventListener("submit", function (e) {
    var newPassword = document.getElementById("new_password").value;
    var confirmPassword = document.getElementById("confirm_password").value;

    if (newPassword !== confirmPassword) {
      e.preventDefault();
      alert("Passwords do not match.");
    }
  });
</script>

</body>
</html>
