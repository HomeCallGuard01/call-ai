<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Call Guard — Set New Password</title>

<style>
  body {
    font-family: Arial;
    background: #0b1220;
    color: white;
    padding: 20px;
    text-align: center;
  }

  h1 {
    color: #00ff99;
    font-size: 26px;
  }

  .box {
    background: #111a2e;
    padding: 30px;
    margin: 20px auto;
    border-radius: 10px;
    max-width: 400px;
    text-align: left;
  }

  label {
    display: block;
    margin-top: 14px;
    margin-bottom: 6px;
    font-size: 14px;
    color: #94a3b8;
  }

  .helper-text {
    margin: 6px 0 0;
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.4;
  }

  input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #334155;
    background: #0b1220;
    color: white;
    font-size: 15px;
    box-sizing: border-box;
  }

  .password-field {
    position: relative;
  }

  .password-field input {
    padding-right: 44px;
  }

  .toggle-password {
    position: absolute;
    right: 4px;
    top: 6px;
    width: auto;
    margin: 0;
    padding: 6px 8px;
    background: transparent;
    border: none;
    color: #94a3b8;
    font-size: 16px;
    font-weight: normal;
    cursor: pointer;
  }

  button, .primary-button {
    width: 100%;
    margin-top: 24px;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    background-color: #00ff99;
    color: black;
    border: none;
    font-weight: bold;
    display: block;
    text-align: center;
    text-decoration: none;
    box-sizing: border-box;
  }

  button:disabled {
    opacity: 0.7;
    cursor: default;
  }

  .error-banner {
    background: #2a1a0f;
    border: 2px solid #f59e0b;
    color: #fde68a;
    padding: 14px 18px;
    border-radius: 8px;
    margin-bottom: 18px;
    font-size: 15px;
    line-height: 1.5;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
    text-align: left;
  }

  .success-panel {
    text-align: center;
  }

  .success-panel h2 {
    color: #00ff99;
    font-size: 22px;
    margin-bottom: 10px;
  }

  .success-panel p {
    color: #cbd5e1;
    font-size: 15px;
    line-height: 1.5;
  }
</style>
</head>

<body>

<img src="/logo.png" style="height:130px; margin-bottom:10px;">

<h1>Set a new password</h1>

<div id="errorBanner" class="error-banner" role="alert" hidden></div>

<div class="box" id="formBox">
  <form id="resetForm" action="/reset-password-complete" method="POST">
    <input type="hidden" id="access_token" name="access_token">
    <input type="hidden" id="refresh_token" name="refresh_token">

    <label for="new_password">New password</label>
    <div class="password-field">
      <input type="password" id="new_password" name="new_password" minlength="8" required>
      <button type="button" class="toggle-password" data-target="new_password" aria-label="Show password">👁</button>
    </div>
    <p class="helper-text">Your new password must be different from your current password.</p>

    <label for="confirm_password">Confirm new password</label>
    <div class="password-field">
      <input type="password" id="confirm_password" name="confirm_password" minlength="8" required>
      <button type="button" class="toggle-password" data-target="confirm_password" aria-label="Show password">👁</button>
    </div>

    <button type="submit" id="submitButton">Set New Password</button>
  </form>
</div>

<div class="box success-panel" id="successPanel" hidden>
  <h2>Password updated successfully</h2>
  <p>Your password has been changed and you're now signed in.</p>
  <a class="primary-button" href="/dashboard">Continue to Dashboard</a>
</div>

<script>
  var ERROR_MESSAGES = {
    same_password: "You have used this password already. Please choose a different password.",
    failed: "We couldn't reset your password. Please try again."
  };

  function showFatalError(message) {
    document.getElementById("formBox").hidden = true;
    var banner = document.getElementById("errorBanner");
    banner.innerHTML = "⚠ " + message +
      ' Please request a new one from the <a href="/forgot-password.html" style="color:#fde68a;">forgot password</a> page.';
    banner.hidden = false;
  }

  function showRetryableError(message) {
    var banner = document.getElementById("errorBanner");
    banner.textContent = "⚠ " + message;
    banner.hidden = false;
  }

  // Supabase puts the recovery token in the URL fragment (never sent to
  // a server, by design), so it can only be read here in the browser.
  var hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
  var accessToken = hashParams.get("access_token");
  var refreshToken = hashParams.get("refresh_token");

  if (!accessToken || !refreshToken) {
    showFatalError("This reset link is missing or invalid.");
  } else {
    document.getElementById("access_token").value = accessToken;
    document.getElementById("refresh_token").value = refreshToken;
  }

  document.querySelectorAll(".toggle-password").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var input = document.getElementById(btn.dataset.target);
      var showing = input.type === "text";
      input.type = showing ? "password" : "text";
      btn.textContent = showing ? "👁" : "🙈";
      btn.setAttribute("aria-label", showing ? "Show password" : "Hide password");
    });
  });

  document.getElementById("resetForm").addEventListener("submit", function (e) {
    e.preventDefault();

    var newPassword = document.getElementById("new_password").value;
    var confirmPassword = document.getElementById("confirm_password").value;
    var btn = document.getElementById("submitButton");

    if (newPassword !== confirmPassword) {
      showRetryableError("Passwords do not match. Please try again.");
      return;
    }

    document.getElementById("errorBanner").hidden = true;
    btn.disabled = true;
    btn.textContent = "Setting password…";

    // Submitted via fetch (same route, same Supabase calls the server was
    // already making) rather than a native form POST, purely so the
    // recovery token already read from the URL fragment above stays in
    // this page's memory — a server redirect can't carry a fragment
    // forward, which would otherwise strand the user on a same_password
    // rejection with no way to retry short of a brand-new email link.
    var body = new URLSearchParams();
    body.set("access_token", document.getElementById("access_token").value);
    body.set("refresh_token", document.getElementById("refresh_token").value);
    body.set("new_password", newPassword);

    fetch("/reset-password-complete", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: body.toString(),
    }).then(function (response) {
      return response.json().then(function (data) {
        return { ok: response.ok, data: data };
      });
    }).then(function (result) {
      if (result.ok && result.data.ok) {
        document.getElementById("formBox").hidden = true;
        document.getElementById("successPanel").hidden = false;
        return;
      }

      btn.disabled = false;
      btn.textContent = "Set New Password";

      var err = result.data.error;
      if (err === "same_password" || err === "failed") {
        showRetryableError(ERROR_MESSAGES[err]);
      } else {
        // Invalid/missing token — genuinely unrecoverable here.
        showFatalError("This reset link is invalid or has expired.");
      }
    }).catch(function () {
      btn.disabled = false;
      btn.textContent = "Set New Password";
      showRetryableError("Something went wrong. Please try again.");
    });
  });
</script>

</body>
</html>
