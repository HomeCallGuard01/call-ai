<!DOCTYPE html>
<html>
<head>
  <title>Home Call Guard
</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      padding: 20px;
    }

    h1 {
      color: #00ff99;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #333;
      padding: 10px;
    }

    th {
      background: #111827;
    }
  </style>
</head>

<body>

<div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
  <img src="/logo.png" style="height:60px;">
  <h2 style="color:white; margin:0; font-size:28px;">
    Home Call <span style="color:#00ff99;">Guard</span>
  </h2>
</div>

<h2>Recent Calls</h2>

<table>
  <thead>
    <tr>
      <th>Number</th>
      <th>Status</th>
      <th>Result</th>
    </tr>
  </thead>
  <tbody>
  </tbody>
</table>

<script>
async function loadCalls() {
  const res = await fetch('/logs');
  const data = await res.json();

  const table = document.querySelector("tbody");
  table.innerHTML = "";

  data.reverse().forEach(call => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${call.number}</td>
      <td>${call.status}</td>
      <td>${call.result}</td>
    `;

    table.appendChild(row);
  });
}

loadCalls();
setInterval(loadCalls, 5000);
</script>

</body>
</html>
